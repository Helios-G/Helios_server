spring.application.name=helios
server.port=8081

# JWT
# src/main/resources/application.properties
jwt.secret=8/js8k7+QEZNhPd87+NmCbkyMKuh8tLR3tRMHe2ir9E=

# PostgreSQL 연결
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/helios_db
spring.datasource.username=helios_user
spring.datasource.password=helios4

# AI 서버 URL
ai.server.url=${AI_SERVER_URL:http://localhost:8000}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 콘솔 SQL 가독성 (선택)
spring.jpa.properties.hibernate.format_sql=true

# 데이터 초기화 설정 (더미데이터)
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# AWS S3
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
cloud.aws.region.static=ap-northeast-2
cloud.aws.s3.bucket=${S3_BUCKET_NAME}
cloud.aws.stack.auto=false

# Swagger UI 접속 경로 설정 (기본값: /swagger-ui/index.html)
springdoc.swagger-ui.path=/swagger-ui.html

# OpenAPI 스펙(JSON) 경로
springdoc.api-docs.path=/api-docs

# UI 표시 순서 및 정렬 설정
springdoc.swagger-ui.groups-order=DESC
springdoc.swagger-ui.operations-sorter=method

# 기본 미디어 타입 설정
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json

# 시큐리티 및 SQL 로그 상세 출력
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG